<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Zone</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b0b0b, #000);
  color: white;
}

/* canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* UI */
header {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 60px 20px;
}

h1 {
  font-size: 52px;
  color: #ffcc00;
  text-shadow: 0 0 15px #ffcc00;
  margin: 0;
}

p {
  opacity: 0.7;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  background: linear-gradient(90deg, #ffcc00, #ff9900);
  color: black;
  font-weight: bold;
  border-radius: 10px;
  text-decoration: none;
  box-shadow: 0 0 20px #ffcc00;
}

/* combo */
#combo {
  position: fixed;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  padding: 8px 16px;
  border: 1px solid #ffcc00;
  color: #ffcc00;
  background: rgba(0,0,0,0.5);
  border-radius: 12px;
  backdrop-filter: blur(10px);
  z-index: 10;
  opacity: 0;
  transition: 0.2s;
}

#combo.show {
  opacity: 1;
  transform: translateX(-50%) scale(1.1);
}

</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="combo">COMBO x1</div>

<header>
  <h1>Lucky Zone</h1>
  <p>Manage & Transfer Funds Smoothly</p>

  <a class="btn" href="https://github.com/TxDevelopers/luckyzone-app/releases/download/v1.0/Lucky.zone.apk">
    Download App
  </a>
</header>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

/* ===== SYSTEMS ===== */
let stars = [];
let coins = [];
let particles = [];

let combo = 0;
let lastClick = 0;
const comboUI = document.getElementById("combo");

/* ===== BACKGROUND STAR ===== */
class Star {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.speed = 0.3 + Math.random();
    this.size = Math.random() * 2;
  }

  update() {
    this.x -= this.speed;
    if (this.x < 0) this.x = canvas.width;
  }

  draw() {
    ctx.fillStyle = "white";
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ===== FLOATING COIN ===== */
class CoinBG {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.speed = 0.5 + Math.random();
    this.size = 2 + Math.random() * 2;
  }

  update() {
    this.x -= this.speed;
    if (this.x < 0) this.x = canvas.width;
  }

  draw() {
    ctx.fillStyle = "#ffcc00";
    ctx.globalAlpha = 0.25;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ===== EXPLOSION COIN ===== */
class Coin {
  constructor(x, y, strong) {
    this.x = x;
    this.y = y;

    let a = Math.random() * Math.PI * 2;
    let s = strong ? 8 : 4;

    this.vx = Math.cos(a) * s;
    this.vy = Math.sin(a) * s;

    this.life = 100;
    this.size = strong ? 5 : 3;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;

    this.vx *= 0.95;
    this.vy *= 0.95;

    this.life--;
  }

  draw() {
    ctx.fillStyle = "#ffcc00";
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#ffcc00";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ===== INIT ===== */
for (let i = 0; i < 80; i++) stars.push(new Star());
for (let i = 0; i < 40; i++) coins.push(new CoinBG());

/* ===== LOOP ===== */
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // background stars
  for (let s of stars) {
    s.update();
    s.draw();
  }

  // floating coins
  for (let c of coins) {
    c.update();
    c.draw();
  }

  // explosion particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  requestAnimationFrame(animate);
}
animate();

/* ===== COMBO ===== */
function updateCombo() {
  comboUI.innerText = "COMBO x" + combo;
  comboUI.classList.add("show");

  clearTimeout(window.t);
  window.t = setTimeout(() => {
    combo = 0;
    comboUI.classList.remove("show");
  }, 1000);
}

/* ===== EXPLOSION ===== */
function explode(x, y, strong) {
  let count = strong ? 40 : 18;

  for (let i = 0; i < count; i++) {
    particles.push(new Coin(x, y, strong));
  }
}

/* ===== CLICK ===== */
function handleClick(x, y) {
  let now = Date.now();

  combo = (now - lastClick < 400) ? combo + 1 : 1;
  lastClick = now;

  updateCombo();
  explode(x, y, combo >= 3);
}

/* ===== EVENTS ===== */
window.addEventListener("click", e => handleClick(e.clientX, e.clientY));
window.addEventListener("touchstart", e => {
  let t = e.touches[0];
  handleClick(t.clientX, t.clientY);
});

/* resize */
window.addEventListener("resize", () => {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
});
</script>

</body>
</html>
